<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTEMAPS SEARCH & GO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* ΧΡΩΜΑΤΑ ΦΩΤΟΓΡΑΦΙΑΣ 1: Ανοιχτό γκρι φόντο */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background: #cbd2d9; 
            color: #333; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* ΜΠΛΕ HEADER ΟΠΩΣ Η ΦΩΤΟ 1 */
        .header { 
            background: #005eb8; 
            color: white; padding: 15px; text-align: center; font-weight: bold; line-height: 1.3; flex-shrink: 0; 
        }
        .title-main { font-size: 1.2em; display: block; letter-spacing: 1px; }
        .title-creator { font-size: 0.7em; display: block; opacity: 0.9; font-weight: normal; margin-top: 4px; }
        .title-name { font-size: 0.95em; display: block; margin-bottom: 8px; }

        .header-info { 
            font-size: 0.85em; font-weight: normal; padding-top: 10px; 
            border-top: 1px solid rgba(255,255,255,0.2); line-height: 1.6;
        }
        .header-info a { color: #ffcc00; text-decoration: none; font-weight: bold; }

        /* ΚΙΤΡΙΝΟ ΚΟΥΜΠΙ REFRESH ΟΠΩΣ Η ΦΩΤΟ 1 */
        .refresh-btn {
            background: #ffcc00; color: #000; border: none; padding: 6px 14px; border-radius: 6px;
            font-weight: 800; font-size: 0.85em; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
            margin-top: 8px; text-transform: uppercase;
        }

        /* ΑΝΑΖΗΤΗΣΗ ΧΩΡΙΣ ΜΙΚΡΟΦΩΝΟ */
        .search-container { padding: 15px; background: transparent; flex-shrink: 0; }
        .search-box { 
            width: 100%; padding: 12px 15px; 
            border: 1px solid #aebac7; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; 
            text-transform: uppercase; background: #e4e7eb; color: #444;
            outline: none; font-weight: bold;
        }

        #status { font-size: 0.9em; text-align: center; padding: 8px; font-weight: bold; }
        .status-active { color: #d63031; } /* Κόκκινο κείμενο GPS όπως η Φώτο 1 */

        /* ΛΙΣΤΑ ΜΕ ΛΕΥΚΑ ΠΛΑΙΣΙΑ ΟΠΩΣ Η ΦΩΤΟ 1 */
        #list { flex: 1; overflow-y: auto; padding: 0 15px; -webkit-overflow-scrolling: touch; }
        .item { 
            background: #ffffff; 
            padding: 16px; margin-bottom: 12px; border-radius: 18px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        /* ΚΕΙΜΕΝΟ ΟΠΩΣ Η ΦΩΤΟ 2 (ΟΝΟΜΑ + ΑΠΟΣΤΑΣΗ ΚΑΤΩ) */
        .name-container { max-width: 60%; }
        .name { font-weight: 800; color: #000; font-size: 1.1em; text-transform: uppercase; display: block; line-height: 1.2; }
        .dist { color: #00aaff; font-weight: 800; font-size: 1em; margin-top: 4px; display: block; }
        
        /* ΜΟΒ ΚΟΥΜΠΙ ΠΛΟΗΓΗΣΗ ΟΠΩΣ Η ΦΩΤΟ 2 */
        .btn { 
            background: #bd00bd; color: white; padding: 12px 18px; border-radius: 12px; 
            text-decoration: none; font-size: 14px; font-weight: bold; min-width: 110px; text-align: center;
            box-shadow: 0 4px 10px rgba(189,0,189,0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="title-main">OTEMAPS SEARCH & GO</span>
        <span class="title-creator">CREATOR</span>
        <span class="title-name">STEFANOS POLYCHROPOULOS</span>
        <div class="header-info">
            ΕΠΙΚΟΙΝΩΝΙΑ: <a href="mailto:spolychropoulos@c-ts.gr">spolychropoulos@c-ts.gr</a><br>
            ΕΝΕΡΓΟΠΟΙΗΣΤΕ ΤΟ GPS ΓΙΑ LIVE ΑΠΟΣΤΑΣΕΙΣ<br>
            ΚΑΙ ΠΑΤΗΣΤΕ <button class="refresh-btn" onclick="location.reload()">🔄 REFRESH</button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="ΑΝΑΖΗΤΗΣΗ ΣΗΜΕΙΟΥ...">
        <div id="status" class="status-active">⚠️ GPS ΑΠΕΝΕΡΓΟΠΟΙΗΜΕΝΟ</div>
    </div>

    <div id="list"></div>

    <script>
        let allData = [];
        let filteredData = [];
        let userPos = null;

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Φόρτωση CSV
        Papa.parse("OTESEARCH&GO.csv", {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.filter(row => row.Name);
                renderList();
                startTracking();
            }
        });

        function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    const statusDiv = document.getElementById('status');
                    statusDiv.innerHTML = "📍 ΤΟΠΟΘΕΣΙΑ ΕΝΕΡΓΗ";
                    statusDiv.style.color = "#00aaff";
                    updateFilteredData();
                }, null, { enableHighAccuracy: true });
            }
        }

        function updateFilteredData() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            allData.forEach(item => {
                if (userPos) item.computedDist = getDistance(userPos.lat, userPos.lon, parseFloat(item.Y), parseFloat(item.X));
            });

            filteredData = allData.filter(item => item.Name.toLowerCase().includes(searchTerm));

            if (userPos) {
                filteredData.sort((a, b) => (a.computedDist || Infinity) - (b.computedDist || Infinity));
            }
            renderList();
        }

        function renderList() {
            const listDiv = document.getElementById('list');
            const dataToUse = filteredData.length > 0 || document.getElementById('search').value !== "" ? filteredData : allData;
            
            listDiv.innerHTML = dataToUse.slice(0, 60).map(item => {
                const distTxt = item.computedDist ? item.computedDist.toFixed(2) + ' KM' : '---';
                const mapLink = "https://www.google.com/maps/dir/?api=1&destination=" + item.Y + "," + item.X;
                
                return `
                    <div class="item">
                        <div class="name-container">
                            <span class="name">${item.Name}</span>
                            <span class="dist">${distTxt}</span>
                        </div>
                        <a class="btn" href="${mapLink}" target="_blank">ΠΛΟΗΓΗΣΗ</a>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', updateFilteredData);
    </script>
</body>
</html>
