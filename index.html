<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTEMAPS Search & Go</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; background: #eceff1; }
        h2 { color: #005eb8; text-align: center; margin-bottom: 10px; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #005eb8; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        #status { font-size: 0.85em; color: #555; text-align: center; margin-bottom: 15px; }
        .item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .name { font-weight: bold; color: #333; font-size: 1.1em; max-width: 65%; }
        .dist { color: #007cbf; font-weight: bold; font-size: 0.9em; }
        .btn { background: #005eb8; color: white; padding: 10px 15px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>OTEMAPS</h2>
    <input type="text" id="search" class="search-box" placeholder="Αναζήτηση (π.χ. ΨΥΧΙΚΟ)...">
    <div id="status">Φόρτωση δεδομένων...</div>
    <div id="list"></div>

    <script>
        let data = [];
        let userPos = null;

        // Υπολογισμός απόστασης
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Φόρτωση του CSV που ανέβασες
        Papa.parse("OTESEARCH&GO.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                data = results.data;
                initGPS();
            }
        });

        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    document.getElementById('status').innerText = "📍 Η τοποθεσία σας βρέθηκε";
                    renderList();
                }, () => {
                    document.getElementById('status').innerText = "⚠️ Το GPS είναι απενεργοποιημένο";
                    renderList();
                });
            }
        }

        function renderList(filter = "") {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";

            let displayData = [...data];

            if (userPos) {
                displayData.forEach(item => {
                    // Χρησιμοποιούμε Χ και Y όπως είναι στο δικό σου CSV
                    item.computedDist = getDistance(userPos.lat, userPos.lon, parseFloat(item.Y), parseFloat(item.X));
                });
                displayData.sort((a, b) => a.computedDist - b.computedDist);
            }

            const filtered = displayData.filter(item => 
                item.Name && item.Name.toLowerCase().includes(filter.toLowerCase())
            ).slice(0, 50); // Δείχνουμε τα 50 κοντινότερα για ταχύτητα

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                const distTxt = item.computedDist ? `${item.computedDist.toFixed(2)} km` : "";
                div.innerHTML = `
                    <div class="name">${item.Name} <br> <span class="dist">${distTxt}</span></div>
                    <a class="btn" href="https://www.google.com/maps/dir/?api=1&destination=${item.Y},${item.X}" target="_blank">GO</a>
                `;
                listDiv.appendChild(div);
            });
        }

        document.getElementById('search').addEventListener('input', (e) => renderList(e.target.value));
    </script>
</body>
</html>
