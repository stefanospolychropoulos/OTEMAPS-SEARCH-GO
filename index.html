<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTEMAPS SEARCH & GO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* ΦΟΝΤΟ ΠΙΣΣΑ ΜΑΥΡΟ */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background: #000000; 
            color: #ffffff; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* HEADER ΟΠΩΣ ΗΤΑΝ ΣΤΗ ΦΩΤΟΓΡΑΦΙΑ ΣΟΥ */
        .header { 
            background: #005eb8; 
            color: white; padding: 12px; text-align: center; font-weight: bold; line-height: 1.2; flex-shrink: 0; 
        }
        .title-main { font-size: 1.1em; display: block; letter-spacing: 1px; }
        .title-creator { font-size: 0.65em; display: block; margin-top: 3px; opacity: 0.8; font-weight: normal; }
        .title-name { font-size: 0.85em; display: block; margin-top: 1px; }

        .header-info { 
            font-size: 0.8em; font-weight: normal; margin-top: 10px; padding-top: 10px; 
            border-top: 1px solid rgba(255,255,255,0.2); line-height: 1.5; 
        }
        .header-info a { color: #ffcc00; text-decoration: none; font-weight: bold; }

        .refresh-inline-btn {
            background: #ffcc00; color: #005eb8; border: none; padding: 6px 14px; border-radius: 6px;
            font-weight: 800; font-size: 0.85em; cursor: pointer; text-transform: uppercase; margin-top: 5px;
        }

        /* ΑΝΑΖΗΤΗΣΗ (ΛΕΥΚΟ ΠΛΑΙΣΙΟ ΜΕ ΕΝΣΩΜΑΤΩΜΕΝΟ ΜΙΚΡΟΦΩΝΟ) */
        .search-container { padding: 15px; background: #000000; flex-shrink: 0; }
        .search-wrapper { position: relative; width: 100%; }
        .search-box { 
            width: 100%; padding: 12px 45px 12px 15px; 
            border: 2px solid #ffffff; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; 
            text-transform: uppercase; background: #ffffff; color: #000000;
            outline: none; font-weight: bold;
        }
        
        /* ΤΟ ΜΙΚΡΟΦΩΝΟ ΠΟΥ ΠΡΟΣΘΕΣΑΜΕ */
        .voice-btn {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; display: flex; align-items: center;
        }
        .voice-btn img { width: 22px; height: 22px; }

        #status { font-size: 0.85em; color: #00aaff; text-align: center; padding: 5px; font-weight: bold; }

        /* ΛΙΣΤΑ (ΛΕΥΚΑ ΠΛΑΙΣΙΑ ΟΝΟΜΑΤΩΝ) */
        #list { flex: 1; overflow-y: auto; padding: 0 15px; -webkit-overflow-scrolling: touch; }
        .item { 
            background: #ffffff; 
            padding: 16px; margin-bottom: 12px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }
        .name { font-weight: bold; color: #000000; font-size: 1em; max-width: 60%; text-transform: uppercase; line-height: 1.2; }
        .dist { color: #005eb8; font-weight: 900; font-size: 0.95em; margin-top: 5px; display: block; }
        
        .btn { 
            background: #ff00ff; color: white; padding: 12px 16px; border-radius: 10px; 
            text-decoration: none; font-size: 13px; font-weight: bold; min-width: 90px; text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="title-main">OTEMAPS SEARCH & GO</span>
        <span class="title-creator">CREATOR</span>
        <span class="title-name">STEFANOS POLYCHROPOULOS</span>
        <div class="header-info">
            ΕΠΙΚΟΙΝΩΝΙΑ: <a href="mailto:spolychropoulos@c-ts.gr">spolychropoulos@c-ts.gr</a><br>
            ΕΝΕΡΓΟΠΟΙΗΣΤΕ ΤΟ GPS ΓΙΑ LIVE ΑΠΟΣΤΑΣΕΙΣ<br>
            ΚΑΙ ΠΑΤΗΣΤΕ <button class="refresh-inline-btn" onclick="location.reload()">REFRESH</button>
        </div>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <input type="text" id="search" class="search-box" placeholder="ΑΝΑΖΗΤΗΣΗ ΣΗΜΕΙΟΥ...">
            <button class="voice-btn" onclick="startDictation()" title="Φωνητική Αναζήτηση">
                <img src="https://img.icons8.com/material-rounded/24/000000/microphone.png" alt="mic">
            </button>
        </div>
        <div id="status">⏳ ΑΝΑΜΟΝΗ GPS...</div>
    </div>

    <div id="list"></div>

    <script>
        let allData = [];
        let filteredData = [];
        let userPos = null;
        let limit = 50;

        // Υπολογισμός απόστασης
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Η ΝΕΑ ΛΕΙΤΟΥΡΓΙΑ ΤΟΥ ΜΙΚΡΟΦΩΝΟΥ
        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition')) {
                var recognition = new webkitSpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = "el-GR"; // Ελληνικά
                recognition.start();

                recognition.onresult = function(e) {
                    document.getElementById('search').value = e.results[0][0].transcript;
                    recognition.stop();
                    updateFilteredData(true); // Φιλτράρισμα μόλις μιλήσεις
                };
                recognition.onerror = function() { recognition.stop(); };
            } else {
                alert("Το μικρόφωνο δεν υποστηρίζεται σε αυτόν τον browser.");
            }
        }

        Papa.parse("OTESEARCH&GO.csv", {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.filter(row => row.Name);
                updateFilteredData(true);
                startTracking();
            }
        });

        function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    document.getElementById('status').innerText = "📍 ΤΟΠΟΘΕΣΙΑ ΕΝΕΡΓΗ";
                    updateFilteredData(true);
                }, null, { enableHighAccuracy: true });
            }
        }

        function updateFilteredData(shouldRender = false) {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            allData.forEach(item => {
                if (userPos) item.computedDist = getDistance(userPos.lat, userPos.lon, parseFloat(item.Y), parseFloat(item.X));
            });
            filteredData = allData.filter(item => item.Name.toLowerCase().includes(searchTerm));
            if (userPos) filteredData.sort((a, b) => (a.computedDist || Infinity) - (b.computedDist || Infinity));
            if(shouldRender) renderList();
        }

        function renderList() {
            const listDiv = document.getElementById('list');
            const itemsToDisplay = filteredData.slice(0, limit);
            listDiv.innerHTML = itemsToDisplay.map(item => {
                const distTxt = item.computedDist ? item.computedDist.toFixed(2) + ' KM' : '---';
                const mapLink = "https://www.google.com/maps/dir/?api=1&destination=" + item.Y + "," + item.X;
                return `
                    <div class="item">
                        <div class="name">${item.Name} <span class="dist">${distTxt}</span></div>
                        <a class="btn" href="${mapLink}" target="_blank">ΠΛΟΗΓΗΣΗ</a>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('search').addEventListener('input', () => updateFilteredData(true));
    </script>
</body>
</html>
